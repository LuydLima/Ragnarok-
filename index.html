<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppleTV</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="theme-toggle-container">
            <button class="theme-toggle" id="themeToggle">Modo claro</button>
        </div>
        <h1>AppleTV</h1>
        <section class="profiles">
            <h2>Quem está assistindo?</h2>
            <ul class="profile-list">
                <li class="profile">
                    <a href="appletv-layout/" class="profile-link" data-profile-name="Kratos" data-profile-image="assets/Perfil-1.jpg">
                        <img src="assets/Perfil-1.jpg" alt="Perfil de Kratos">
                        <p>Kratos</p>
                    </a>
                </li>
                <li class="profile">
                    <a href="appletv-layout/" class="profile-link" data-profile-name="Atreus" data-profile-image="assets/Perfil-2.jpg">
                        <img src="assets/Perfil-2.jpg" alt="Perfil de Atreus">
                        <p>Atreus</p>
                    </a>
                </li>
                <li class="profile">
                    <a href="appletv-layout/" class="profile-link" data-profile-name="Mimir" data-profile-image="assets/Perfil-3.jpg">
                        <img src="assets/Perfil-3.jpg" alt="Perfil de Mimir">
                        <p>Mimir</p>
                    </a>
                </li>
                <li class="profile">
                    <a href="appletv-layout/" class="profile-link" data-profile-name="Freya" data-profile-image="assets/Perfil-4.jpg">
                        <img src="assets/Perfil-4.jpg" alt="Perfil de Freya">
                        <p>Freya</p>
                    </a>
                </li>
            </ul>
        </section>

        <button id="editProfilesBtn">Editar perfis</button>
    </main>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;

        const setThemeButton = (mode) => {
            if (mode === 'light') {
                themeToggle.textContent = '🌙';
            } else {
                themeToggle.textContent = '☀️';
            }
        };

        const loadTheme = () => {
            const storedTheme = localStorage.getItem('theme');
            if (storedTheme === 'light') {
                body.classList.remove('theme-dark');
                body.classList.add('theme-light');
                setThemeButton('light');
            } else {
                body.classList.remove('theme-light');
                body.classList.add('theme-dark');
                setThemeButton('dark');
            }
        };

        const toggleTheme = () => {
            if (body.classList.contains('theme-dark')) {
                body.classList.remove('theme-dark');
                body.classList.add('theme-light');
                setThemeButton('light');
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.remove('theme-light');
                body.classList.add('theme-dark');
                setThemeButton('dark');
                localStorage.setItem('theme', 'dark');
            }
        };

        themeToggle.addEventListener('click', toggleTheme);
        loadTheme();

        // LocalStorage para perfil ativo
        const profileLinks = document.querySelectorAll('.profile-link');
        profileLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                const profileName = link.getAttribute('data-profile-name');
                const profileImage = link.getAttribute('data-profile-image');
                localStorage.setItem('activeProfile', JSON.stringify({
                    name: profileName,
                    image: profileImage
                }));
            });
        });
    </script>
</body>
</html>
